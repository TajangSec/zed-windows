permissions:
  contents: write
name: Sync and Release Upstream

on:
  schedule:
    - cron: '0 0 * * *'  # 每天UTC午夜检查更新
  workflow_dispatch:     # 允许手动触发

jobs:
  check-updates:
    name: Check for Updates
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.get_source_ver.outputs.source_version }}
      should_proceed: ${{ steps.compare_versions.outputs.should_proceed }}
    
    steps:
    - name: Get upstream version
      id: get_source_ver
      run: |
        source_ver=$(curl -s https://api.github.com/repos/zed-industries/zed/releases/latest | jq -r .tag_name)
        echo "source_version=$source_ver" >> $GITHUB_OUTPUT

    - name: Get current version
      id: get_current_ver
      run: |
        current_ver=$(curl -f -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name || echo "v0.0.0")
        echo "current_version=$current_ver" >> $GITHUB_OUTPUT

    - name: Compare versions
      id: compare_versions
      run: |
        if [ "${{ steps.get_source_ver.outputs.source_version }}" != "${{ steps.get_current_ver.outputs.current_version }}" ]; then
          echo "should_proceed=true" >> $GITHUB_OUTPUT
        else
          echo "should_proceed=false" >> $GITHUB_OUTPUT
        fi

  sync-repository:
    name: Sync Repository
    needs: check-updates
    if: needs.check-updates.outputs.should_proceed == 'true'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true  # 保留 GITHUB_TOKEN 凭证

    - name: Configure upstream
      run: git remote add upstream https://github.com/zed-industries/zed.git

    - name: Fetch upstream tags
      run: git fetch upstream --tags

    - name: Reset to upstream release
      run: |
        git checkout -B main ${{ needs.check-updates.outputs.new_version }}
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main --force

  build-windows:
    name: Build Windows
    needs: sync-repository
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        targets: x86_64-pc-windows-msvc

    - name: Build release
      run: cargo build --release --target x86_64-pc-windows-msvc

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: windows-bin
        path: target/x86_64-pc-windows-msvc/release/zed.exe

  create-release:
    name: Create Release
    needs: [check-updates, build-windows]
    if: needs.check-updates.outputs.should_proceed == 'true'
    runs-on: ubuntu-latest
    
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v3
      with:
        name: windows-bin
        path: dist

    - name: Create release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ needs.check-updates.outputs.new_version }}
        release_name: "Version ${{ needs.check-updates.outputs.new_version }}"
        body: |
          Automated build from upstream release:
          https://github.com/zed-industries/zed/releases/tag/${{ needs.check-updates.outputs.new_version }}
        draft: false
        prerelease: false

    - name: Upload asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: dist/zed.exe
        asset_name: zed-windows-${{ needs.check-updates.outputs.new_version }}.exe
        asset_content_type: application/octet-stream