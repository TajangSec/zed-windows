name: Auto Update and Release

on:
  schedule:
    - cron: '0 0 * * *'  # 每天午夜检查更新
  workflow_dispatch:      # 允许手动触发

jobs:
  check-update:
    runs-on: ubuntu-latest
    outputs:
      should_update: ${{ steps.check.outputs.should_update }}
      new_version: ${{ steps.check.outputs.new_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest release from source repo
        id: source_release
        uses: octokit/request-action@v3.1.0
        with:
          route: GET /repos/zed-industries/zed/releases/latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read current version
        id: current_version
        run: |
          if [ -f version.txt ]; then
            echo "::set-output name=version::$(cat version.txt)"
          else
            echo "::set-output name=version::0.0.0"
          fi

      - name: Check version
        id: check
        run: |
          SOURCE_VERSION="${{ steps.source_release.outputs.data.tag_name }}"
          CURRENT_VERSION="${{ steps.current_version.outputs.version }}"
          echo "Source version: $SOURCE_VERSION"
          echo "Current version: $CURRENT_VERSION"
          if [ "$SOURCE_VERSION" != "$CURRENT_VERSION" ]; then
            echo "::set-output name=should_update::true"
            echo "::set-output name=new_version::$SOURCE_VERSION"
          else
            echo "::set-output name=should_update::false"
          fi

  update-and-build:
    runs-on: windows-latest
    needs: check-update
    if: needs.check-update.outputs.should_update == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set upstream remote
        run: git remote add upstream https://github.com/zed-industries/zed.git

      - name: Pull upstream changes
        run: |
          git fetch upstream
          git merge upstream/main --no-edit
          git push origin main

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          override: true

      - name: Build Windows binary
        run: |
          cargo build --release --locked
          mkdir release
          copy target\release\zed.exe release\
          7z a zed-${{ needs.check-update.outputs.new_version }}-windows-x64.zip release\zed.exe

      - name: Save version file
        run: echo ${{ needs.check-update.outputs.new_version }} > version.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zed-release
          path: |
            zed-${{ needs.check-update.outputs.new_version }}-windows-x64.zip
            version.txt

  release:
    runs-on: ubuntu-latest
    needs: update-and-build
    if: needs.check-update.outputs.should_update == 'true'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: zed-release

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.check-update.outputs.new_version }}
          name: Release ${{ needs.check-update.outputs.new_version }}
          body: |
            Automated release for version ${{ needs.check-update.outputs.new_version }}
          files: |
            zed-${{ needs.check-update.outputs.new_version }}-windows-x64.zip
            version.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version update
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add version.txt
          git commit -m "Update version to ${{ needs.check-update.outputs.new_version }}"
          git push origin main